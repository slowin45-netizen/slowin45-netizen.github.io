<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BUZZ DICE | Ultimate Dice Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* ========== ORTAK AYARLAR ========== */
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: background 0.3s ease;
            position: relative;
        }

        /* ========== TEMA RENKLERİ – ÇARPICI, PARLAK, DOKULU ========== */
        body.blue {
            --accent: #0ea5e9;
            --accent-glow: #0ea5e9cc;
            --btn-start: #0ea5e9;
            --btn-end: #0369a1;
            --btn-hover: #38bdf8;
            --grad-bg: radial-gradient(circle at 30% 40%, #0a3a6a, #021a3a);
            --card-bg: rgba(10, 40, 70, 0.85);
            --text-light: #e0f2fe;
            --border-color: #0ea5e9;
            --theme-texture: repeating-linear-gradient(110deg, rgba(14,165,233,0.2) 0px, rgba(14,165,233,0.2) 2px, transparent 2px, transparent 20px), radial-gradient(circle at 20% 30%, rgba(14,165,233,0.2) 2px, transparent 2px);
        }
        body.green {
            --accent: #10b981;
            --accent-glow: #10b981cc;
            --btn-start: #10b981;
            --btn-end: #047857;
            --btn-hover: #34d399;
            --grad-bg: radial-gradient(circle at 30% 40%, #0a3a1a, #021a0a);
            --card-bg: rgba(0, 50, 20, 0.85);
            --text-light: #d1fae5;
            --border-color: #10b981;
            --theme-texture: repeating-linear-gradient(135deg, rgba(16,185,129,0.2) 0px, rgba(16,185,129,0.2) 2px, transparent 2px, transparent 20px), repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 8px);
        }
        body.red {
            --accent: #f43f5e;
            --accent-glow: #f43f5ecc;
            --btn-start: #f43f5e;
            --btn-end: #be123c;
            --btn-hover: #fb7185;
            --grad-bg: radial-gradient(circle at 30% 40%, #4a1a1a, #1a0505);
            --card-bg: rgba(70, 20, 20, 0.85);
            --text-light: #ffe0e0;
            --border-color: #f43f5e;
            --theme-texture: repeating-linear-gradient(0deg, rgba(244,63,94,0.25) 0px, rgba(244,63,94,0.25) 2px, transparent 2px, transparent 14px), radial-gradient(circle at 60% 70%, rgba(244,63,94,0.2) 3px, transparent 3px);
        }
        body.pink {
            --accent: #f472b6;
            --accent-glow: #f472b6cc;
            --btn-start: #f472b6;
            --btn-end: #db2777;
            --btn-hover: #f9a8d4;
            --grad-bg: radial-gradient(circle at 30% 40%, #3a1a2a, #1a0510);
            --card-bg: rgba(60, 20, 50, 0.85);
            --text-light: #fce7f3;
            --border-color: #f472b6;
            --theme-texture: repeating-radial-gradient(circle at 20% 40%, rgba(244,114,182,0.25) 3px, transparent 3px), repeating-linear-gradient(45deg, rgba(244,114,182,0.12) 0px, rgba(244,114,182,0.12) 1px, transparent 1px, transparent 12px);
        }
        body.bw {
            --accent: #94a3b8;
            --accent-glow: #cbd5e1cc;
            --btn-start: #94a3b8;
            --btn-end: #64748b;
            --btn-hover: #cbd5e1;
            --grad-bg: radial-gradient(circle at 30% 40%, #2c3e50, #1a252f);
            --card-bg: rgba(30, 30, 40, 0.85);
            --text-light: #f5f6fa;
            --border-color: #94a3b8;
            --theme-texture: repeating-linear-gradient(90deg, rgba(148,163,184,0.2) 0px, rgba(148,163,184,0.2) 1px, transparent 1px, transparent 6px), repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 20px);
        }
        /* Los Tralaleritos – Deniz mavisi, özel doku ve resim */
        body.los {
            --accent: #00d2ff;
            --accent-glow: #00d2ffcc;
            --btn-start: #00d2ff;
            --btn-end: #0077b6;
            --btn-hover: #3ae2ff;
            --grad-bg: radial-gradient(circle at 30% 40%, #023e8a, #03045e);
            --card-bg: rgba(0, 80, 110, 0.85);
            --text-light: #e0f7fa;
            --border-color: #00d2ff;
            --theme-texture: none;
        }
        /* OG – Vintage bronz, nostaljik */
        body.og {
            --accent: #f59e0b;
            --accent-glow: #f59e0baa;
            --btn-start: #f59e0b;
            --btn-end: #b45309;
            --btn-hover: #fbbf24;
            --grad-bg: radial-gradient(circle at 30% 40%, #4a2e1a, #1a0e05);
            --card-bg: rgba(60, 40, 20, 0.85);
            --text-light: #fef0d8;
            --border-color: #f59e0b;
            --theme-texture: repeating-linear-gradient(45deg, rgba(245,158,11,0.15) 0px, rgba(245,158,11,0.15) 2px, transparent 2px, transparent 15px), repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 8px);
        }

        /* Arka plan dokuları (los hariç) */
        body.blue::before, body.green::before, body.red::before, body.pink::before, body.bw::before, body.og::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--theme-texture);
            background-size: auto, auto;
            background-repeat: repeat, repeat;
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: overlay;
            opacity: 0.6;
        }

        /* Los Tralaleritos: özel arka plan (küçük resim tekrarı) */
        body.los::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.image2url.com/r2/default/images/1780783552979-9d6290c8-daaa-4edb-b5f5-29bb9e2ef726.png');
            background-size: 80px 80px;
            background-repeat: repeat;
            background-position: 0 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0.35;
            mix-blend-mode: overlay;
        }

        /* Hareketli ışık efekti (tüm temalar) */
        body::after {
            content: "";
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 40% 50%, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
            animation: rotateLight 60s linear infinite;
            mix-blend-mode: overlay;
        }

        body.og::after {
            animation: rotateLight 90s linear infinite;
            mix-blend-mode: soft-light;
        }

        @keyframes rotateLight {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        body {
            background: var(--grad-bg);
            color: var(--text-light);
        }

        /* ANA KART – ultra şık, neon kenar */
        .guts-card {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 2px solid var(--border-color);
            box-shadow: 0 0 35px var(--accent-glow), 0 20px 40px -10px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            position: relative;
            z-index: 3;
        }

        /* BAŞLIK – göz alıcı gradient */
        .brand {
            text-align: center;
            padding: 0.9rem 1rem 0.5rem;
            border-bottom: 3px solid var(--accent);
            flex-shrink: 0;
            background: rgba(0,0,0,0.2);
        }
        .brand h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, var(--accent), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: themeGlow 2s ease-in-out infinite;
        }
        @keyframes themeGlow {
            0% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            50% { filter: drop-shadow(0 0 12px var(--accent-glow)); }
            100% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        }

        /* KONTROLLER – modern ferah */
        .control-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 0.8rem 1rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0,0,0,0.3);
            border-radius: 80px;
            flex-shrink: 0;
        }
        .ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid var(--accent);
        }
        .ctrl label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        select, input {
            background: #1a1a2a;
            border: 1px solid var(--accent);
            border-radius: 40px;
            padding: 4px 12px;
            font-weight: bold;
            color: #fff;
            outline: none;
            cursor: pointer;
            font-size: 0.75rem;
        }
        select:focus, input:focus {
            border-color: #fff;
            box-shadow: 0 0 0 2px var(--accent);
        }
        input {
            width: 70px;
            text-align: center;
        }

        /* ZAR ALANI */
        .dice-container {
            margin: 0.3rem 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 1.5rem;
            padding: 0.8rem;
            min-height: 190px;
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 1;
        }
        .dice-container::-webkit-scrollbar {
            width: 5px;
        }
        .dice-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        .dice-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .dice-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            align-items: center;
        }

        /* ZAR – sabit beyaz çentik ve daire */
        .premium-die {
            width: 95px;
            height: 95px;
            background: #0a0a0a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, filter 0.1s;
            box-shadow: 0 5px 10px -2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            flex-shrink: 0;
        }
        .premium-die::before {
            content: "";
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            pointer-events: none;
        }
        .premium-die::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .color-premium {
            background: var(--die-color);
            box-shadow: 0 5px 10px -2px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.2);
        }
        .number-premium {
            background: #0a0a0a;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .premium-die:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* DÖNME ANİMASYONU */
        @keyframes diceSpin3D {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }
        .spinning {
            animation: diceSpin3D 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards !important;
        }

        /* BUTON – modern etkileyici */
        .action {
            text-align: center;
            margin: 0.5rem 0;
            flex-shrink: 0;
        }
        .roll-btn {
            background: linear-gradient(135deg, var(--btn-start), var(--btn-end));
            border: none;
            padding: 10px 34px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        .roll-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* RENK LİSTESİ – şık kartlar */
        .color-section {
            margin: 0.3rem 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 1.2rem;
            padding: 0.6rem;
            text-align: center;
            flex-shrink: 0;
            border: 1px solid var(--accent);
        }
        .color-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
        }
        .color-item {
            background: rgba(0,0,0,0.6);
            padding: 0.25rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            border: 1px solid var(--accent);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* GEÇMİŞ – minimalist */
        .history-panel {
            margin: 0.3rem 1rem 0.6rem;
            background: rgba(0,0,0,0.2);
            border-radius: 1.2rem;
            padding: 0.6rem;
            max-height: 150px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .history-panel::-webkit-scrollbar {
            width: 4px;
        }
        .history-panel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        .history-panel::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .history-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            color: var(--accent);
            margin-bottom: 0.4rem;
            letter-spacing: 1px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        .history-row {
            background: rgba(0,0,0,0.45);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #facc15;
            width: 90%;
            max-width: 380px;
            text-align: center;
            letter-spacing: 1px;
            border-left: 3px solid var(--accent);
            backdrop-filter: blur(4px);
        }

        .theme-hint {
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            padding: 0 0.5rem;
            flex-shrink: 0;
        }

        .dice-hidden .premium-die {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s ease;
        }
        .dice-visible .premium-die {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.15s ease;
        }

        @media (max-width: 750px) {
            .premium-die { width: 75px; height: 75px; border-radius: 18px; }
            .premium-die::before { border-width: 1.5px; border-radius: 14px; top: 3px; left: 3px; right: 3px; bottom: 3px; }
            .premium-die::after { width: 10px; height: 10px; }
            .roll-btn { font-size: 1rem; padding: 6px 24px; }
            .brand h1 { font-size: 1.5rem; }
            .color-item { font-size: 0.7rem; padding: 0.2rem 0.8rem; }
            .dice-image { width: 45px; height: 45px; }
            body.los::before { background-size: 50px 50px; }
        }
    </style>
</head>
<body class="blue">
<div class="guts-card">
    <div class="brand">
        <h1>⚡ BUZZ DICE ⚡</h1>
    </div>

    <div class="control-bar">
        <div class="ctrl">
            <label>🎲 TYPE</label>
            <select id="diceTypeSelect">
                <option value="color">🌈 COLOR</option>
                <option value="number">🔢 NUMBER</option>
            </select>
        </div>
        <div class="ctrl">
            <label>🔢 COUNT</label>
            <input type="number" id="diceCountInput" min="1" max="80" value="4">
        </div>
        <div class="ctrl">
            <label>🎨 THEME</label>
            <select id="themeSelect"></select>
        </div>
    </div>

    <div class="dice-container" id="diceContainer">
        <div class="dice-grid" id="diceGrid"></div>
    </div>

    <div class="action">
        <button class="roll-btn" id="rollBtn">🎲 ROLL AGAIN! 🎲</button>
    </div>

    <div class="color-section">
        <div class="color-list">
            <span class="color-item">🔴 KIRMIZI</span>
            <span class="color-item">🟠 TURUNCU</span>
            <span class="color-item">🟡 SARI</span>
            <span class="color-item">🟢 YEŞİL</span>
            <span class="color-item">🔵 MAVİ</span>
            <span class="color-item">🟣 MOR</span>
        </div>
    </div>

    <div class="history-panel">
        <div class="history-title">📜 LAST 5 ROLLS</div>
        <div class="history-list" id="historyList"></div>
    </div>
    <div class="theme-hint" id="themeHint"></div>
</div>

<script>
    const COLOR_SET = [
        { name: "KIRMIZI", hex: "#dd0000", short: "🔴" },
        { name: "TURUNCU", hex: "#fd8b06", short: "🟠" },
        { name: "SARI",   hex: "#fdd706", short: "🟡" },
        { name: "YEŞİL",  hex: "#03c100", short: "🟢" },
        { name: "MAVİ",   hex: "#1e00d9", short: "🔵" },
        { name: "MOR",    hex: "#430083", short: "🟣" }
    ];

    // Los Tralaleritos için özel zar resmi
    const LOS_IMAGE_URL = "https://www.image2url.com/r2/default/images/1780783552979-9d6290c8-daaa-4edb-b5f5-29bb9e2ef726.png";

    let totalRolls = 0;
    let colorHistory = [];
    let currentColorSet = [];
    let currentNumberSet = [];
    let isRolling = false;
    let rollTimeout = null;

    const rollAudio = new Audio('https://www.image2url.com/r2/default/audio/1780681449818-f8cfecd4-0f2c-4fa4-a12a-1a602ba3e1c9.mp3');
    rollAudio.preload = 'auto';
    let audioUnlocked = false;
    function unlockAudio() {
        if (audioUnlocked) return;
        rollAudio.load();
        rollAudio.play().then(() => {
            rollAudio.pause();
            rollAudio.currentTime = 0;
            audioUnlocked = true;
        }).catch(() => {});
    }
    document.body.addEventListener('click', unlockAudio, { once: true });
    function playSound() {
        rollAudio.currentTime = 0;
        rollAudio.play().catch(e => console.log("ses"));
    }

    const themeSelect = document.getElementById('themeSelect');
    const themeHint = document.getElementById('themeHint');

    const themes = [
        { id: "los", name: "Los Tralaleritos", unlock: 0, emoji: "🌊" },
        { id: "blue", name: "BLUE", unlock: 0, emoji: "🔵" },
        { id: "green", name: "GREEN", unlock: 0, emoji: "🟢" },
        { id: "red", name: "RED", unlock: 0, emoji: "🔴" },
        { id: "pink", name: "PINK", unlock: 0, emoji: "💗" },
        { id: "bw", name: "B&W", unlock: 0, emoji: "☯️" },
        { id: "og", name: "OG", unlock: 100, emoji: "🔮" }
    ];

    function updateThemeSelect() {
        const currentVal = themeSelect.value;
        themeSelect.innerHTML = '';
        for (let t of themes) {
            const opt = document.createElement('option');
            opt.value = t.id;
            let label = t.emoji + ' ' + t.name;
            if (t.unlock > 0 && totalRolls < t.unlock) {
                label = '🔒 ' + label + ` (${t.unlock} rolls)`;
                opt.disabled = true;
            } else {
                opt.disabled = false;
            }
            opt.textContent = label;
            themeSelect.appendChild(opt);
        }
        let found = false;
        for (let i = 0; i < themeSelect.options.length; i++) {
            if (themeSelect.options[i].value === currentVal && !themeSelect.options[i].disabled) {
                themeSelect.selectedIndex = i;
                found = true;
                break;
            }
        }
        if (!found) {
            for (let i = 0; i < themeSelect.options.length; i++) {
                if (!themeSelect.options[i].disabled) {
                    themeSelect.selectedIndex = i;
                    break;
                }
            }
        }
        const newTheme = themeSelect.value;
        document.body.className = newTheme;
        renderActiveDice(false);
        if (totalRolls < 100) themeHint.innerText = "🔮 100 rolls to unlock OG theme";
        else themeHint.innerText = "🎉 ALL THEMES UNLOCKED! 🎉";
    }

    themeSelect.addEventListener('change', (e) => {
        document.body.className = e.target.value;
        renderActiveDice(false);
    });

    const diceCountInput = document.getElementById('diceCountInput');
    function updateDiceCount() {
        let val = parseInt(diceCountInput.value, 10);
        if (isNaN(val)) val = 4;
        val = Math.min(80, Math.max(1, val));
        diceCountInput.value = val;
    }
    diceCountInput.addEventListener('input', updateDiceCount);
    diceCountInput.addEventListener('change', updateDiceCount);

    function getRandomColor() { return { ...COLOR_SET[Math.floor(Math.random() * COLOR_SET.length)] }; }
    function getRandomNumber() { return Math.floor(Math.random() * 6) + 1; }
    function generateColorSet(count) { let arr = []; for (let i = 0; i < count; i++) arr.push(getRandomColor()); return arr; }
    function generateNumberSet(count) { let arr = []; for (let i = 0; i < count; i++) arr.push(getRandomNumber()); return arr; }

    const diceTypeSelect = document.getElementById('diceTypeSelect');
    const diceGrid = document.getElementById('diceGrid');

    function renderActiveDice(withSpin = false) {
        const activeType = diceTypeSelect.value;
        const currentTheme = document.body.className;
        if (activeType === 'color') {
            if (!currentColorSet.length) {
                diceGrid.innerHTML = '<div style="width:100%; text-align:center;">⚡</div>';
                return;
            }
            let html = '';
            for (let d of currentColorSet) {
                if (currentTheme === 'los') {
                    html += `<div class="premium-die color-premium" style="--die-color: ${d.hex};">
                                <img src="${LOS_IMAGE_URL}" class="dice-image" style="width: 60px; height: 60px; object-fit: contain; position: relative; z-index: 2; border-radius: 12px;">
                            </div>`;
                } else {
                    html += `<div class="premium-die color-premium" style="--die-color: ${d.hex};"></div>`;
                }
            }
            diceGrid.innerHTML = html;
        } else {
            if (!currentNumberSet.length) {
                diceGrid.innerHTML = '<div style="width:100%; text-align:center;">⚡</div>';
                return;
            }
            let html = '';
            for (let num of currentNumberSet) {
                html += `<div class="premium-die number-premium">${num}</div>`;
            }
            diceGrid.innerHTML = html;
        }
        if (withSpin) {
            const diceElements = document.querySelectorAll('.premium-die');
            diceElements.forEach(die => {
                die.classList.add('spinning');
                setTimeout(() => die.classList.remove('spinning'), 450);
            });
        }
    }

    function addToHistory(diceSet) {
        if (!diceSet.length) return;
        const shortStr = diceSet.map(d => d.short).join(' ');
        colorHistory.unshift(shortStr);
        if (colorHistory.length > 5) colorHistory.pop();
        const historyDiv = document.getElementById('historyList');
        if (colorHistory.length === 0) {
            historyDiv.innerHTML = '<div class="history-row">—</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < colorHistory.length; i++) {
            html += `<div class="history-row">${i+1}. ${colorHistory[i]}</div>`;
        }
        historyDiv.innerHTML = html;
    }

    async function performRoll() {
        if (isRolling) return;
        isRolling = true;

        const activeType = diceTypeSelect.value;
        const count = parseInt(diceCountInput.value, 10);
        
        if (activeType === 'color') {
            currentColorSet = generateColorSet(count);
        } else {
            currentNumberSet = generateNumberSet(count);
        }

        const container = document.getElementById('diceContainer');
        container.classList.add('dice-hidden');
        container.classList.remove('dice-visible');
        playSound();

        if (rollTimeout) clearTimeout(rollTimeout);
        rollTimeout = setTimeout(() => {
            totalRolls++;
            updateThemeSelect();
            renderActiveDice(true);
            if (activeType === 'color') addToHistory(currentColorSet);
            container.classList.remove('dice-hidden');
            container.classList.add('dice-visible');
            document.getElementById('rollBtn').style.transform = '';
            isRolling = false;
            rollTimeout = null;
        }, 540);
    }

    diceTypeSelect.addEventListener('change', () => renderActiveDice(false));

    function initDemo() {
        currentColorSet = generateColorSet(4);
        currentNumberSet = generateNumberSet(4);
        renderActiveDice(false);
        addToHistory(currentColorSet);
        updateDiceCount();
        totalRolls = 0;
        updateThemeSelect();
        document.getElementById('diceContainer').classList.add('dice-visible');
    }

    document.getElementById('rollBtn').addEventListener('click', performRoll);
    diceCountInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performRoll(); });

    initDemo();
</script>
</body>
</html>
